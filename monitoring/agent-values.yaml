agent:
  mode: "flow"

  storagePath: /var/lib/grafana-agent

  resources:
    requests:
      memory: "60Mi"
      cpu: "50m"
    limits:
      memory: "150Mi"
      cpu: "200m"

  configReloader:
    resources:
      requests:
        memory: "20Mi"
        cpu: "10m"
      limits:
        memory: "40Mi"
        cpu: "50m"

  extraEnv:
    - name: GRAFANA_REMOTE_WRITE_URL
      valueFrom:
        secretKeyRef:
          name: grafana-agent-credentials
          key: remote_write_url
    - name: GRAFANA_USERNAME
      valueFrom:
        secretKeyRef:
          name: grafana-agent-credentials
          key: username
    - name: GRAFANA_API_KEY
      valueFrom:
        secretKeyRef:
          name: grafana-agent-credentials
          key: api_key

  configMap:
    create: true
    content: |

      // == InvestPilot pod scraping ==========================================

      discovery.kubernetes "investpilot_pods" {
        role = "pod"
        namespaces {
          names = ["investpilot"]
        }
      }

      discovery.relabel "investpilot_pods" {
        targets = discovery.kubernetes.investpilot_pods.targets
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
          action        = "keep"
          regex         = "true"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
          action        = "replace"
          target_label  = "__metrics_path__"
          regex         = "(.+)"
        }
        rule {
          source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
          action        = "replace"
          regex         = "([^:]+)(?:\\d+)?;(\\d+)"
          replacement   = "$1:$2"
          target_label  = "__address__"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_label_app"]
          target_label  = "app"
        }
        rule {
          source_labels = ["__meta_kubernetes_namespace"]
          target_label  = "namespace"
        }
        rule {
          source_labels = ["__meta_kubernetes_pod_name"]
          target_label  = "pod"
        }
      }

      prometheus.scrape "investpilot_pods" {
        targets         = discovery.relabel.investpilot_pods.output
        forward_to      = [prometheus.remote_write.grafana_cloud.receiver]
        scrape_interval = "60s"
      }

      // == kube-state-metrics ===============================================

      prometheus.scrape "kube_state_metrics" {
        targets = [{
          __address__ = "kube-state-metrics.monitoring.svc.cluster.local:8080",
        }]
        forward_to      = [prometheus.remote_write.grafana_cloud.receiver]
        scrape_interval = "60s"
      }

      // == node-exporter (CPU/RAM/disk per VPS) =============================

      prometheus.scrape "node_exporter" {
        targets = [{
          __address__ = "node-exporter-prometheus-node-exporter.monitoring.svc.cluster.local:9100",
        }]
        forward_to      = [prometheus.remote_write.grafana_cloud.receiver]
        scrape_interval = "60s"
      }

      // == Remote write to Grafana Cloud =====================================

      prometheus.remote_write "grafana_cloud" {
        endpoint {
          url = env("GRAFANA_REMOTE_WRITE_URL")
          basic_auth {
            username = env("GRAFANA_USERNAME")
            password = env("GRAFANA_API_KEY")
          }
          queue_config {
            min_shards           = 1
            max_shards           = 2
            max_samples_per_send = 500
            batch_send_deadline  = "10s"
          }
        }
        wal {
          truncate_frequency = "30m"
          max_keepalive_time = "1h"
        }
        external_labels = {
          cluster = "investpilot-k3s",
        }
      }

extraVolumes:
  - name: agent-wal
    emptyDir: {}

extraVolumeMounts:
  - name: agent-wal
    mountPath: /var/lib/grafana-agent

rbac:
  create: true

serviceAccount:
  create: true