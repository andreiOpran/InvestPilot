          isPaused: false
          notification_settings:
            receiver: email-critical
        - uid: afm4x80i85fy8b
          title: Node High Memory (<15% free)
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: grafanacloud-prom
              model:
                editorMode: code
                expr: node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes
