        - uid: cfm4wyilyz30gc
          title: Go API - High 5xx Error Rate
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: grafanacloud-prom
              model:
                editorMode: code
                expr: |-
                    rate(investpilot_operational_http_requests_total{status=~"5.."}[5m])
                      /
                    rate(investpilot_operational_http_requests_total[5m])
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
