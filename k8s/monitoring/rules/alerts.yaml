          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: email-critical
        - uid: afm4watgvfzeoc
          title: High Command Error Rate
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 10800
                to: 0
              datasourceUid: grafanacloud-prom
              model:
                editorMode: code
                expr: |-
                    rate(investpilot_decisional_commands_received_total{status="error"}[5m])
                    /
                    rate(investpilot_decisional_commands_received_total[5m])
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0.1
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: OK
          execErrState: Error
          for: 5m
          annotations:
            summary: Command error rate >10% on {{ $labels.command }}
          labels:
            severity: warning
          isPaused: false
          notification_settings:
            receiver: email-warnings
        - uid: cfm4wlopxw6wwc
          title: RabbitMQ Publish Failures
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: grafanacloud-prom
              model:
                editorMode: code
                expr: increase(investpilot_operational_commands_published_total{status="error"}[5m])
