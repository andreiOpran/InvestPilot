                to: 0
              datasourceUid: grafanacloud-prom
              model:
                editorMode: code
                expr: time() - kube_cronjob_status_last_successful_time{namespace="investpilot", cronjob="cron-pipeline-daily"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 90000
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          annotations:
            summary: Daily pipeline has not succeeded in >25 hours
          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: email-critical
