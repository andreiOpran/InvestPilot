apiVersion: 1
groups:
    - orgId: 1
      name: investpilot-alerts
      folder: InvestPilot
      interval: 1m
      rules:
        - uid: dfm1bfq6mdfy8d
          title: Pod CrashLooping
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: grafanacloud-prom
              model:
                editorMode: code
                expr: rate(kube_pod_container_status_restarts_total{namespace="investpilot", pod!~"^cron.*"}[5m])
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 2m
          annotations:
            summary: Pod {{ $labels.pod }} is crash-looping
          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: email-critical
        - uid: efm1d75w6fuv4e
          title: Pod Not Ready
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: grafanacloud-prom
              model:
                editorMode: code
                expr: kube_pod_status_ready{namespace="investpilot", condition="true", pod!~"^cron.*"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 1
                        type: lt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 5m
          annotations:
            summary: Pod {{ $labels.pod }} is not ready
          labels:
            severity: warning
          isPaused: false
          notification_settings:
            receiver: email-warnings
        - uid: afm4sb15kuolcb
          title: Deployment Replicas Mismatch
          condition: C
