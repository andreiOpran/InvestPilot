              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: grafanacloud-prom
              model:
                editorMode: code
                expr: kube_deployment_spec_replicas{namespace="investpilot"} - kube_deployment_status_replicas_available{namespace="investpilot"}
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 5m
          labels:
            severity: warning
          isPaused: false
          notification_settings:
            receiver: email-warnings
        - uid: dfm4t27mghc74f
          title: CronJob Failed
          condition: C
          data:
            - refId: A
              relativeTimeRange:
                from: 600
                to: 0
              datasourceUid: grafanacloud-prom
              model:
                editorMode: code
                expr: |-
                    kube_job_status_failed{namespace="investpilot"}
                    * on(job_name) group_left()
                    (time() - kube_job_status_start_time{namespace="investpilot"} < 3600)
                instant: true
                intervalMs: 1000
                legendFormat: __auto
                maxDataPoints: 43200
                range: false
                refId: A
            - refId: C
              queryType: expression
              datasourceUid: __expr__
              model:
                conditions:
                    - evaluator:
                        params:
                            - 0
                        type: gt
                      operator:
                        type: and
                      query:
                        params:
                            - C
                      reducer:
                        params: []
                        type: last
                      type: query
                datasource:
                    type: __expr__
                    uid: __expr__
                expression: A
                intervalMs: 1000
                maxDataPoints: 43200
                refId: C
                type: threshold
          noDataState: NoData
          execErrState: Error
          for: 1m
          labels:
            severity: critical
          isPaused: false
          notification_settings:
            receiver: email-critical
        - uid: bfm4tzp1ci680b
