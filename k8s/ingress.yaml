apiVersion: networking.k8s.io/v1
# ingress object tells Traefik how to route traffic
kind: Ingress
metadata:
  name: investpilot-ingress
  namespace: investpilot
  annotations:
    # Traefik only serves this route on the HTTPS (443) entrypoint
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
spec:
  # explicitly bind this Ingress to the Traefik controller
  ingressClassName: traefik
  tls:
    - hosts:
        - investpilot.live
      secretName: cloudflare-origin-tls
  rules:
    - host: investpilot.live
      http:
        paths:
          #  /api is listed first, so Traefik matches more specific paths first to route API calls to Go node
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: operational-service
                port:
                  number: 8081
          #  everything else goes to the Nginx frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: nginx-service
                port:
                  number: 80